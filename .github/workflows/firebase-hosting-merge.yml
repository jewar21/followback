name: Deploy Production to Firebase Hosting

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID_RESOLVED: ${{ secrets.FIREBASE_PROJECT_ID || secrets.VITE_FIREBASE_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test -- --run

      - name: Build app
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Validate Firebase project id
        run: |
          if [ -z "$FIREBASE_PROJECT_ID_RESOLVED" ]; then
            echo "Missing FIREBASE_PROJECT_ID secret. Set FIREBASE_PROJECT_ID or VITE_FIREBASE_PROJECT_ID in GitHub Secrets."
            exit 1
          fi

      - name: Authenticate Firebase CLI
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_FOLLOWBACK }}' > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Install functions dependencies
        run: npm ci --prefix functions

      - name: Validate email automation secrets
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "Missing RESEND_API_KEY secret."
            exit 1
          fi

          if [ -z "$MAIL_FROM" ]; then
            echo "Missing MAIL_FROM secret."
            exit 1
          fi

          if [ -z "$APP_BASE_URL" ]; then
            echo "Missing APP_BASE_URL secret."
            exit 1
          fi

      - name: Write functions environment
        env:
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          EMAIL_AUTOMATION_ENABLED: ${{ secrets.EMAIL_AUTOMATION_ENABLED }}
          ADMIN_CAMPAIGNS_ENABLED: ${{ secrets.ADMIN_CAMPAIGNS_ENABLED }}
        run: |
          cat > functions/.env <<EOF
          MAIL_FROM=$MAIL_FROM
          APP_BASE_URL=$APP_BASE_URL
          EMAIL_AUTOMATION_ENABLED=${EMAIL_AUTOMATION_ENABLED:-false}
          ADMIN_CAMPAIGNS_ENABLED=${ADMIN_CAMPAIGNS_ENABLED:-false}
          EOF

      - name: Sync RESEND_API_KEY to Firebase Secret Manager
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          printf '%s' "$RESEND_API_KEY" > "$RUNNER_TEMP/resend_api_key.txt"
          firebase functions:secrets:set RESEND_API_KEY \
            --project "$FIREBASE_PROJECT_ID_RESOLVED" \
            --data-file "$RUNNER_TEMP/resend_api_key.txt"

      - name: Deploy Firestore and Functions
        run: firebase deploy --project "$FIREBASE_PROJECT_ID_RESOLVED" --only firestore,functions --non-interactive

      - name: Deploy production
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FOLLOWBACK }}
          channelId: live
          projectId: ${{ env.FIREBASE_PROJECT_ID_RESOLVED }}
